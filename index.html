<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>George AI Finance</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f8fafc; color: #0f172a; -webkit-tap-highlight-color: transparent; }
        .card { background: white; border-radius: 24px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); border: 1px solid #e2e8f0; }
        .glass-header { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(12px); border-bottom: 1px solid #f1f5f9; }
        .btn-press { transition: transform 0.1s; } .btn-press:active { transform: scale(0.95); }
        .toggle-checkbox:checked { right: 0; border-color: #3b82f6; }
        .toggle-checkbox:checked + .toggle-label { background-color: #3b82f6; }
        .loader { border: 2px solid #f3f3f3; border-top: 2px solid #3b82f6; border-radius: 50%; width: 14px; height: 14px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="pb-32 select-none">

    <nav class="p-5 sticky top-0 z-50 glass-header flex justify-between items-center">
        <div class="flex items-center gap-3">
            <button onclick="openSettings()" class="btn-press w-10 h-10 bg-slate-900 rounded-xl flex items-center justify-center text-white font-bold shadow-lg ring-2 ring-slate-100 active:ring-blue-500 transition-all">G</button>
            <div>
                <h2 class="font-bold text-lg leading-tight text-slate-800">George AI</h2>
                <div id="statusDot" class="text-[10px] font-bold text-orange-500 flex items-center gap-1">
                    <span class="w-2 h-2 rounded-full bg-orange-500 animate-pulse"></span> INITIALIZING...
                </div>
            </div>
        </div>
        <button onclick="init()" class="text-xs font-bold text-blue-600 bg-blue-50 px-4 py-2 rounded-full hover:bg-blue-100 transition-colors">REFRESH</button>
    </nav>

    <div class="px-5 mt-4">
        <div class="card p-6 bg-slate-900 text-white border-none relative overflow-hidden shadow-2xl">
            <div class="absolute top-0 right-0 w-32 h-32 bg-blue-500 rounded-full blur-3xl opacity-20 -mr-10 -mt-10"></div>
            <p class="text-slate-400 text-xs font-bold uppercase tracking-widest mb-1">Cloud Balance</p>
            <h1 id="uiBalance" class="text-5xl font-black tracking-tighter mb-4">...</h1>
            
            <div class="relative pt-1">
                <div class="flex mb-2 items-center justify-between">
                    <div><span class="text-[10px] font-semibold inline-block py-1 px-2 uppercase rounded-full text-blue-200 bg-blue-900" id="budgetLabel">Budget Usage</span></div>
                    <div class="text-right"><span class="text-[10px] font-semibold inline-block text-blue-200" id="budgetPercent">0%</span></div>
                </div>
                <div class="overflow-hidden h-2 mb-4 text-xs flex rounded bg-slate-700">
                    <div id="budgetBar" style="width:0%" class="bg-blue-500 transition-all duration-1000"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="px-5 mt-6">
        <div class="card p-4 flex gap-4 items-center bg-blue-50 border-blue-200 min-h-[80px]">
            <div id="aiIcon" class="text-2xl">🤖</div>
            <div id="aiTipBox" class="text-[11px] font-bold text-blue-800 italic leading-relaxed w-full">
                Waiting for input...
            </div>
        </div>
    </div>

    <div class="px-5 mt-6 sticky top-24 z-40">
        <div class="card p-2 flex gap-2 shadow-xl ring-4 ring-slate-50/80 backdrop-blur-sm">
            <input type="text" id="omniInput" placeholder="Type naturally: 'Coffee 200'..." disabled
                class="flex-1 p-3 bg-transparent outline-none font-bold text-slate-700 placeholder:text-slate-300 placeholder:font-normal text-lg disabled:opacity-50"
                onkeydown="if(event.key==='Enter') sendToAI()">
            <button id="sendBtn" onclick="sendToAI()" disabled class="bg-blue-600 text-white w-14 rounded-xl font-bold text-2xl btn-press flex items-center justify-center shadow-lg disabled:opacity-50 disabled:bg-slate-400">↵</button>
        </div>
    </div>

    <div class="px-5 mt-8">
        <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4 ml-1">Transactions (From Sheet)</h3>
        <div id="txList" class="space-y-3 pb-24"></div>
    </div>

    <div id="settingsPanel" class="fixed inset-0 bg-black/50 z-[60] hidden backdrop-blur-sm transition-opacity" onclick="closeSettings(event)">
        <div class="absolute bottom-0 left-0 right-0 bg-white rounded-t-[32px] p-8 shadow-2xl transform transition-transform duration-300 translate-y-full" id="settingsContent">
            <div class="w-12 h-1 bg-slate-200 rounded-full mx-auto mb-6"></div>
            <h2 class="text-2xl font-black text-slate-900 mb-6">Cloud Settings</h2>
            <div class="space-y-6">
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase mb-2">Daily Budget (Stored in Sheet)</label>
                    <input type="number" id="budgetInput" class="w-full p-4 bg-slate-100 rounded-xl font-bold text-slate-900 outline-none focus:ring-2 ring-blue-500" onchange="pushSettings()">
                </div>
                <div class="flex items-center justify-between p-4 bg-slate-50 rounded-2xl border border-slate-100">
                    <div><p class="font-bold text-sm text-slate-800">Privacy Mode</p><p class="text-[10px] text-slate-400">Mask Income</p></div>
                    <div class="relative inline-block w-12 mr-2 align-middle select-none transition duration-200 ease-in">
                        <input type="checkbox" name="toggle" id="privacyToggle" class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 appearance-none cursor-pointer" onclick="pushSettings()"/>
                        <label for="privacyToggle" class="toggle-label block overflow-hidden h-6 rounded-full bg-slate-300 cursor-pointer"></label>
                    </div>
                </div>
                <div class="pt-4 border-t border-slate-100">
                    <label class="block text-xs font-bold text-slate-400 uppercase mb-2">Gemini API Key</label>
                    <input type="password" id="geminiKeyInput" placeholder="Enter new key" class="w-full p-3 bg-slate-50 rounded-lg text-xs font-mono outline-none mb-2">
                    <button onclick="pushSettings(true)" class="w-full p-3 bg-slate-900 text-white rounded-lg font-bold text-xs">Save Key to Cloud</button>
                </div>
                <div class="mt-4">
                     <button onclick="exportCSV()" class="w-full p-4 bg-slate-100 rounded-xl font-bold text-xs text-slate-600 active:bg-slate-200">📄 Download Data</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // *** CONFIG: DEPLOYMENT URL ***
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzTLunx5M42joN_PLbDkHEKJH_bFHJe4Mg0HYBlIMnV7qEC4-xQxcgURPNPCdMp2NIGYA/exec";
        
        let appData = { 
            balance: 0, 
            expenses: [],
            budget: 350,
            privacy: true 
        };

        async function init() {
            setStatus("SYNCING...", "text-orange-500", "bg-orange-500");
            disableInput(true);
            try {
                const res = await fetch(SCRIPT_URL);
                const data = await res.json();
                
                appData.balance = parseFloat(data.balance) || 0;
                appData.expenses = data.expenses || [];
                appData.budget = parseFloat(data.budget) || 350;
                appData.privacy = data.privacy; // Boolean from server

                renderUI();
                renderSettings();
                setStatus("ONLINE", "text-green-500", "bg-green-500");
                disableInput(false);
            } catch (e) {
                console.error(e);
                setStatus("OFFLINE", "text-red-500", "bg-red-500");
            }
        }

        async function sendToAI() {
            const input = document.getElementById('omniInput');
            const txt = input.value;
            if (!txt) return;

            // UI LOADING STATE
            input.value = "";
            input.placeholder = "AI is processing...";
            disableInput(true);
            document.getElementById('aiTipBox').innerText = "Analyzing text, extracting data, and judging you...";
            document.getElementById('aiIcon').innerHTML = '<div class="loader"></div>';

            try {
                const res = await fetch(SCRIPT_URL, { 
                    method: 'POST', 
                    body: JSON.stringify({ action: "process_text", text: txt }) 
                });
                const data = await res.json();

                if(data.status === "Success") {
                    appData.balance = data.balance;
                    // Add new item to local list optimistically (or just re-init)
                    appData.expenses.push(data.parsed); 
                    
                    document.getElementById('aiTipBox').innerText = data.parsed.advice;
                    document.getElementById('aiIcon').innerText = "🤖";
                    
                    renderUI();
                } else {
                    alert("AI Error: " + data.message);
                }
            } catch (e) {
                alert("Network Error");
            }

            input.placeholder = "Type naturally: 'Coffee 200'...";
            disableInput(false);
            input.focus();
        }

        async function pushSettings(updateKey = false) {
            const budget = parseFloat(document.getElementById('budgetInput').value);
            const privacy = document.getElementById('privacyToggle').checked;
            const key = document.getElementById('geminiKeyInput').value;

            const payload = { 
                action: "save_settings", 
                budget: budget, 
                privacy: privacy 
            };
            
            if(updateKey && key) payload.geminiKey = key;

            // Optimistic update
            appData.budget = budget;
            appData.privacy = privacy;
            renderUI();

            await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
            if(updateKey) { alert("Key Saved!"); document.getElementById('geminiKeyInput').value = ""; }
        }

        async function deleteTx(desc, amt) {
            if(!confirm(`Delete "${desc}"?`)) return;
            setStatus("DELETING...", "text-orange-500", "bg-orange-500");
            const res = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: "delete", description: desc, amount: amt }) });
            const data = await res.json();
            if(data.status === "Deleted") {
                appData.balance = data.balance; // Sync balance from server
                // Remove from local list
                appData.expenses = appData.expenses.filter(tx => !(tx.description === desc && tx.amount === amt));
                renderUI();
                setStatus("ONLINE", "text-green-500", "bg-green-500");
            }
        }

        function renderUI() {
            // Balance
            document.getElementById('uiBalance').innerText = `₹${appData.balance.toLocaleString()}`;
            
            // Budget Bar
            const todayIST = new Date().toLocaleDateString('en-US', { timeZone: 'Asia/Kolkata' });
            const todaySpend = appData.expenses
                .filter(t => new Date(t.date).toLocaleDateString('en-US', { timeZone: 'Asia/Kolkata' }) === todayIST && t.type === 'DEBIT')
                .reduce((sum, t) => sum + parseFloat(t.amount), 0);
            
            const budgetPct = Math.min((todaySpend / appData.budget) * 100, 100);
            document.getElementById('budgetBar').style.width = `${budgetPct}%`;
            document.getElementById('budgetPercent').innerText = `${Math.round(budgetPct)}%`;
            
            // List
            const list = document.getElementById('txList');
            list.innerHTML = '';
            
            [...appData.expenses].reverse().slice(0, 20).forEach(tx => {
                const isIncome = tx.type === 'CREDIT' || tx.category === 'Income';
                const color = isIncome ? 'text-green-600' : 'text-slate-900';
                const icon = getIcon(tx.category);
                
                let amountDisplay = `₹${tx.amount.toLocaleString()}`;
                if (isIncome && appData.privacy) { amountDisplay = "••••••"; }
                
                list.innerHTML += `
                <div class="card p-4 flex justify-between items-center group active:scale-[0.98] transition-transform">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 bg-slate-50 rounded-xl flex items-center justify-center text-xl border border-slate-100">${icon}</div>
                        <div>
                            <p class="font-bold text-sm text-slate-800 leading-tight">${tx.description}</p>
                            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">${tx.category}</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="font-black ${color} text-lg tracking-tight">${isIncome ? '+' : ''}${amountDisplay}</p>
                        <button onclick="deleteTx('${tx.description}', ${tx.amount})" class="text-[10px] text-red-500 font-bold opacity-0 group-hover:opacity-100 transition-opacity uppercase tracking-widest">Delete 🗑️</button>
                    </div>
                </div>`;
            });
        }

        function renderSettings() {
            document.getElementById('budgetInput').value = appData.budget;
            document.getElementById('privacyToggle').checked = appData.privacy;
        }

        function getIcon(cat) {
            const map = { 'Income': '💰', 'Food': '🍔', 'Transport': '⛽', 'Tech': '⚡', 'Invest': '📈' };
            return map[cat] || '🛍️';
        }

        function setStatus(msg, txtColor, dotColor) {
            const el = document.getElementById('statusDot');
            el.innerHTML = `<span class="w-2 h-2 rounded-full ${dotColor} ${msg.includes('...') ? 'animate-pulse' : ''}"></span> ${msg}`;
            el.className = `text-[10px] font-bold flex items-center gap-1 ${txtColor}`;
        }

        function disableInput(bool) {
            document.getElementById('omniInput').disabled = bool;
            document.getElementById('sendBtn').disabled = bool;
        }

        function openSettings() { document.getElementById('settingsPanel').classList.remove('hidden'); setTimeout(() => { document.getElementById('settingsContent').classList.remove('translate-y-full'); }, 10); }
        function closeSettings(e) { if(e.target.id === 'settingsPanel') { document.getElementById('settingsContent').classList.add('translate-y-full'); setTimeout(() => { document.getElementById('settingsPanel').classList.add('hidden'); }, 300); } }
        function exportCSV() { /* ...Same as before... */ }
        
        init();
    </script>
</body>
</html>
