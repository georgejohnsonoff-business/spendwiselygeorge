<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SpendWise George</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f8fafc; color: #0f172a; -webkit-tap-highlight-color: transparent; }
        .card { background: white; border-radius: 24px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); border: 1px solid #e2e8f0; }
        .glass-header { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); border-bottom: 1px solid #f1f5f9; }
        .btn-press { transition: transform 0.1s; } .btn-press:active { transform: scale(0.95); }
    </style>
</head>
<body class="pb-32 select-none">

    <nav class="p-5 sticky top-0 z-50 glass-header flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-slate-900 rounded-xl flex items-center justify-center text-white font-bold shadow-lg">G</div>
            <div>
                <h2 class="font-bold text-lg leading-tight">SpendWise</h2>
                <div id="statusDot" class="text-[10px] font-bold text-orange-500 flex items-center gap-1">
                    <span class="w-2 h-2 rounded-full bg-orange-500 animate-pulse"></span> CONNECTING...
                </div>
            </div>
        </div>
        <button onclick="init()" class="text-xs font-bold text-blue-600 bg-blue-50 px-3 py-1 rounded-full">REFRESH</button>
    </nav>

    <div class="px-5 mt-4">
        <div class="card p-6 bg-slate-900 text-white border-none relative overflow-hidden shadow-2xl">
            <div class="absolute top-0 right-0 w-32 h-32 bg-blue-500 rounded-full blur-3xl opacity-20 -mr-10 -mt-10"></div>
            <p class="text-slate-400 text-xs font-bold uppercase tracking-widest mb-1">Total Liquidity</p>
            <h1 id="uiBalance" class="text-5xl font-black tracking-tighter mb-4">...</h1>
            <div class="flex gap-2">
                <span class="text-[10px] bg-slate-800 px-3 py-1.5 rounded-lg text-slate-300 border border-slate-700">
                    💡 Tip: Type "+5000 Salary" to add funds
                </span>
            </div>
        </div>
    </div>

    <div class="px-5 mt-6">
        <div class="h-36 flex gap-3">
            <div class="card flex-1 p-2 flex flex-col justify-center items-center relative">
                <canvas id="miniChart"></canvas>
                <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
                    <span class="text-[10px] font-bold text-slate-300 opacity-50">SPEND</span>
                </div>
            </div>
            <div id="aiTipBox" class="card flex-1 p-4 text-[10px] leading-relaxed font-semibold text-slate-600 flex items-center italic bg-blue-50 border-blue-100">
                Initializing Financial Intelligence Engine...
            </div>
        </div>
    </div>

    <div class="px-5 mt-6 sticky top-24 z-40">
        <div class="card p-2 flex gap-2 shadow-xl ring-4 ring-slate-50/80 backdrop-blur-sm">
            <input type="text" id="omniInput" placeholder="Try '180 Starbucks'..." 
                class="flex-1 p-3 bg-transparent outline-none font-bold text-slate-700 placeholder:text-slate-300 placeholder:font-normal text-lg"
                onkeydown="if(event.key==='Enter') processOmni()">
            <button onclick="processOmni()" class="bg-blue-600 text-white w-14 rounded-xl font-bold text-2xl btn-press flex items-center justify-center shadow-lg">↵</button>
        </div>
    </div>

    <div class="px-5 mt-8">
        <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4 ml-1">Recent Activity</h3>
        <div id="txList" class="space-y-3 pb-10"></div>
    </div>

    <script>
        // --- CONFIGURATION ---
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwac4cH_KgV7IDvuWIRqOZNauci3AGZ_QnnMoMaIySQpKhuU3gEV_WCfSF0LHU0WVXzhg/exec";
        
        let localData = { balance: 0, expenses: [] };
        let chartInstance = null;

        // --- CORE ENGINE ---
        async function init() {
            setStatus("SYNCING...", "text-orange-500", "bg-orange-500");
            try {
                const res = await fetch(SCRIPT_URL);
                const data = await res.json();
                
                localData.balance = parseFloat(data.balance) || 0;
                localData.expenses = data.expenses || [];
                
                renderUI();
                setStatus("ONLINE", "text-green-500", "bg-green-500");
            } catch (e) {
                console.error(e);
                setStatus("OFFLINE", "text-red-500", "bg-red-500");
            }
        }

        // --- RENDER LOGIC ---
        function renderUI() {
            // 1. Balance
            document.getElementById('uiBalance').innerText = `₹${localData.balance.toLocaleString()}`;
            
            // 2. List
            const list = document.getElementById('txList');
            list.innerHTML = '';
            
            // Show newest 20 items
            [...localData.expenses].reverse().slice(0, 20).forEach(tx => {
                const isCredit = tx.type === 'CREDIT' || tx.category === 'Income';
                const color = isCredit ? 'text-green-600' : 'text-slate-900';
                const sign = isCredit ? '+' : '-';
                const icon = getIcon(tx.category);

                list.innerHTML += `
                <div class="card p-4 flex justify-between items-center group active:scale-[0.98] transition-transform">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 bg-slate-50 rounded-xl flex items-center justify-center text-xl border border-slate-100">${icon}</div>
                        <div>
                            <p class="font-bold text-sm text-slate-800 leading-tight">${tx.description}</p>
                            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">${tx.category}</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="font-black ${color} text-lg">${sign}₹${tx.amount}</p>
                        <button onclick="deleteTx('${tx.description}', ${tx.amount})" class="text-[10px] text-red-500 font-bold opacity-0 group-hover:opacity-100 transition-opacity uppercase tracking-widest">Delete 🗑️</button>
                    </div>
                </div>`;
            });

            updateChart();
            generateInsight();
        }

        // --- SMART INPUT PARSER ---
        async function processOmni() {
            const input = document.getElementById('omniInput');
            const val = input.value;
            if (!val) return;

            // Extract Number
            const amtMatch = val.match(/(\d+)/);
            if (!amtMatch) { alert("Please include a number."); return; }
            
            const amount = parseFloat(amtMatch[0]);
            // Clean description
            let desc = val.replace(amount, '').trim();
            desc = desc.replace(/^[+\-]/, '').trim() || "General";
            
            // Detect Income vs Expense
            const isIncome = val.includes('+') || ['salary', 'income', 'deposit'].some(w => desc.toLowerCase().includes(w));
            const category = isIncome ? "Income" : autoCategorize(desc);

            // Optimistic Update (Immediate Feedback)
            const oldBal = localData.balance;
            localData.balance = isIncome ? oldBal + amount : oldBal - amount;
            document.getElementById('uiBalance').innerText = `₹${localData.balance.toLocaleString()}`;
            
            // Clear Input
            input.value = "Saving...";
            
            // Send to Cloud
            await fetch(SCRIPT_URL, { 
                method: 'POST', 
                body: JSON.stringify({ 
                    action: "add", 
                    type: isIncome ? "income" : "expense", 
                    amount, 
                    category, 
                    description: desc 
                }) 
            });
            
            input.value = "";
            init(); // Re-sync to confirm
        }

        async function deleteTx(desc, amt) {
            if(!confirm(`Permanently delete "${desc}"?`)) return;
            setStatus("DELETING...", "text-orange-500", "bg-orange-500");
            await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: "delete", description: desc, amount: amt }) });
            init();
        }

        // --- HELPERS ---
        function autoCategorize(text) {
            const t = text.toLowerCase();
            if (t.includes('food') || t.includes('tea') || t.includes('coffee') || t.includes('swiggy')) return 'Food';
            if (t.includes('uber') || t.includes('auto') || t.includes('fuel') || t.includes('petrol')) return 'Transport';
            if (t.includes('recharge') || t.includes('wifi') || t.includes('amazon')) return 'Tech';
            if (t.includes('sip') || t.includes('stock')) return 'Invest';
            return 'General';
        }

        function getIcon(cat) {
            const map = { 'Income': '💰', 'Food': '🍔', 'Transport': '⛽', 'Tech': '⚡', 'Invest': '📈' };
            return map[cat] || '🛍️';
        }

        function updateChart() {
            const cats = {};
            localData.expenses.forEach(t => {
                // Only chart spending
                if(t.type !== 'CREDIT' && t.category !== 'Income') {
                    cats[t.category] = (cats[t.category] || 0) + parseFloat(t.amount);
                }
            });
            
            const ctx = document.getElementById('miniChart').getContext('2d');
            if(chartInstance) chartInstance.destroy();
            
            // Handle empty data case
            if (Object.keys(cats).length === 0) return;

            chartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(cats),
                    datasets: [{ 
                        data: Object.values(cats), 
                        backgroundColor: ['#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#6366f1'], 
                        borderWidth: 0,
                        hoverOffset: 4
                    }]
                },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false, 
                    plugins: { legend: { display: false } }, 
                    cutout: '75%',
                    layout: { padding: 5 }
                }
            });
        }

        function generateInsight() {
            if (localData.expenses.length === 0) return;
            const last = localData.expenses[localData.expenses.length - 1];
            
            if (last.type === 'CREDIT' || last.category === 'Income') {
                document.getElementById('aiTipBox').innerText = `🚀 Wealth Alert: You just added ₹${last.amount}. Use it wisely!`;
                document.getElementById('aiTipBox').className = "card flex-1 p-4 text-[10px] leading-relaxed font-bold text-green-700 flex items-center bg-green-50 border-green-100";
            } else {
                // Compound Interest: Future Value = P(1+r)^t
                const fVal = Math.round(last.amount * Math.pow(1.12, 10)); 
                document.getElementById('aiTipBox').innerText = `💡 1000 IQ: That ₹${last.amount} spend has an opportunity cost of ₹${fVal.toLocaleString()} (10y @ 12% return).`;
                document.getElementById('aiTipBox').className = "card flex-1 p-4 text-[10px] leading-relaxed font-semibold text-blue-800 flex items-center bg-blue-50 border-blue-100";
            }
        }

        function setStatus(msg, txtColor, dotColor) {
            const el = document.getElementById('statusDot');
            el.innerHTML = `<span class="w-2 h-2 rounded-full ${dotColor} ${msg === 'SYNCING...' ? 'animate-pulse' : ''}"></span> ${msg}`;
            el.className = `text-[10px] font-bold flex items-center gap-1 ${txtColor}`;
        }

        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }

        init();
    </script>
</body>
</html>
